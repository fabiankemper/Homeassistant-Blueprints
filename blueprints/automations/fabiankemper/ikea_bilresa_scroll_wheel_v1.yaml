blueprint:
  name: IKEA Bilresa Scrollwheel - Fast updates
  description: |
    A zero-lag Brightness controller for the IKEA Bilresa Smart Scroll Wheel. 
    Instead of directly commanding the light on every tick, the scroll wheel instantly updates a Helper entity, while buttons control the light and sync the helper.

    **SETUP INSTRUCTIONS:**
    **1. Create the Helper:**
    You need an Input Number helper (Min 0, Max 100). You can create it via the UI (Settings > Helpers) OR by adding this to your `configuration.yaml`:

    ```yaml
    input_number:
      bilresa_helper:
        name: "Bilresa Brightness Helper"
        min: 0
        max: 100
        step: 1
        mode: slider
    ```
    **2. Enable Sensors:** Enable Up (1), Down (2), and Button Event (3). DISABLE the Button Sensor (3).

    **3. Select Entities Below:** Choose your Light, your new Helper, and the sensors.

    **4. Create the Link Automation:** You must create a separate standard automation to link the Helper to the Light.

    ```yaml
    alias: "Link: Bilresa Helper to Light"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_number.bilresa_helper
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state | int == 0 }}"
            sequence:
              - action: light.turn_off
                target:
                  entity_id: light.your_light
                data:
                  transition: 0.2
        default:
          - action: light.turn_on
            target:
              entity_id: light.your_light
            data:
              brightness_pct: "{{ trigger.to_state.state | int }}"
              transition: 0.2
      - delay:
          milliseconds: 200
    ```

    You can the the same for the other two pages. Just swap (1) -> (4)/(7), (2) -> (5)/(8), (3) -> (6)/(9)
  domain: automation
  input:
    light_entity:
      name: Light (or Group)
      selector:
        entity:
          domain:
            - light
          reorder: false
          multiple: false
    helper_entity:
      name: Brightness Helper (Input Number)
      description: "The Input Number helper you created (Min 0, Max 100)."
      selector:
        entity:
          domain:
            - input_number
          reorder: false
          multiple: false
    step_pct:
      name: "Scroll Step Size (%)"
      default: 5
      selector:
        number:
          min: 1.0
          max: 50.0
          unit_of_measurement: "%"
          step: 1.0
          mode: slider
    val_b1:
      name: "Brightness 1 (%)"
      default: 80
      selector:
        number:
          min: 0.0
          max: 100.0
          unit_of_measurement: "%"
          step: 1.0
          mode: slider
    val_b2:
      name: "Brightness 2 (%)"
      default: 20
      selector:
        number:
          min: 0.0
          max: 100.0
          unit_of_measurement: "%"
          step: 1.0
          mode: slider
    btn_single:
      name: "Action: Single Click"
      default: toggle
      selector:
        select:
          options:
            - label: Set to Brightness 1
              value: set_b1
            - label: Set to Brightness 2
              value: set_b2
            - label: Toggle On/Off
              value: toggle
            - label: Turn Off
              value: turn_off
            - label: No Action
              value: none
          sort: false
          multiple: false
    btn_double:
      name: "Action: Double Click"
      default: set_b1
      selector:
        select:
          options:
            - label: Set to Brightness 1
              value: set_b1
            - label: Set to Brightness 2
              value: set_b2
            - label: Toggle On/Off
              value: toggle
            - label: Turn Off
              value: turn_off
            - label: No Action
              value: none
          sort: false
          multiple: false
    btn_hold:
      name: "Action: Hold"
      default: set_b2
      selector:
        select:
          options:
            - label: Set to Brightness 1
              value: set_b1
            - label: Set to Brightness 2
              value: set_b2
            - label: Toggle On/Off
              value: toggle
            - label: Turn Off
              value: turn_off
            - label: No Action
              value: none
          sort: false
          multiple: false
    sensor_up:
      name: Scroll Up Sensor
      selector:
        entity:
          domain:
            - sensor
          reorder: false
          multiple: false
    sensor_down:
      name: Scroll Down Sensor
      selector:
        entity:
          domain:
            - sensor
          reorder: false
          multiple: false
    event_button:
      name: Button Event
      selector:
        entity:
          domain:
            - event
          reorder: false
          multiple: false
mode: queued
max: 15
max_exceeded: silent
variables:
  target_light: !input light_entity
  target_helper: !input helper_entity
  s_p: !input step_pct
  v_b1: !input val_b1
  v_b2: !input val_b2
  a_single: !input btn_single
  a_double: !input btn_double
  a_hold: !input btn_hold
triggers:
  - trigger: state
    entity_id: !input sensor_up
    id: sc_up
  - trigger: state
    entity_id: !input sensor_down
    id: sc_down
  - trigger: state
    entity_id: !input event_button
    id: btn_event
conditions:
  - condition: template
    value_template: "{{ trigger.from_state is defined and trigger.to_state is defined and trigger.from_state.state not in ['unknown', 'unavailable'] and trigger.to_state.state not in ['unknown', 'unavailable'] }}"
actions:
  - choose:
      - conditions: "{{ 'sc_' in trigger.id }}"
        sequence:
          - variables:
              direction: "{% if trigger.id == 'sc_up' %} 1 {% else %} -1 {% endif %}"
              current_val: "{{ states(target_helper) | float(50) }}"
              new_val: "{{ [ [ current_val + (s_p | float(5) * direction), 100 ] | min, 0 ] | max }}"
          - action: input_number.set_value
            target:
              entity_id: "{{ target_helper }}"
            data:
              value: "{{ new_val }}"
  - choose:
      - conditions: "{{ trigger.id == 'btn_event' }}"
        sequence:
          - variables:
              action_code: >
                {% if trigger.to_state.attributes.event_type == 'multi_press_1' %} {{ a_single }}
                {% elif trigger.to_state.attributes.event_type == 'multi_press_2' %} {{ a_double }}
                {% elif trigger.to_state.attributes.event_type == 'long_press' %} {{ a_hold }}
                {% else %} none {% endif %}
          - choose:
              - conditions: "{{ action_code == 'set_b1' }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ target_helper }}"
                    data:
                      value: "{{ v_b1 }}"
                  - action: light.turn_on
                    target:
                      entity_id: "{{ target_light }}"
                    data:
                      brightness_pct: "{{ v_b1 }}"
                      transition: 0.5
              - conditions: "{{ action_code == 'set_b2' }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ target_helper }}"
                    data:
                      value: "{{ v_b2 }}"
                  - action: light.turn_on
                    target:
                      entity_id: "{{ target_light }}"
                    data:
                      brightness_pct: "{{ v_b2 }}"
                      transition: 0.5
              - conditions: "{{ action_code == 'turn_off' }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ target_helper }}"
                    data:
                      value: 0
                  - action: light.turn_off
                    target:
                      entity_id: "{{ target_light }}"
                    data:
                      transition: 0.5
              - conditions: "{{ action_code == 'toggle' }}"
                sequence:
                  - choose:
                      - conditions: "{{ is_state(target_light, 'on') }}"
                        sequence:
                          - action: input_number.set_value
                            target:
                              entity_id: "{{ target_helper }}"
                            data:
                              value: 0
                          - action: light.turn_off
                            target:
                              entity_id: "{{ target_light }}"
                            data:
                              transition: 0.5
                    default:
                      - action: input_number.set_value
                        target:
                          entity_id: "{{ target_helper }}"
                        data:
                          value: "{{ v_b1 }}"
                      - action: light.turn_on
                        target:
                          entity_id: "{{ target_light }}"
                        data:
                          brightness_pct: "{{ v_b1 }}"
                          transition: 0.5
